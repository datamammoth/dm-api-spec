  /api/v2/servers/{id}:
    get:
      operationId: getServer
      tags:
        - Servers
      summary: Get server detail
      description: >-
        Retrieve detailed information about a specific server, including live status and usage metrics from the
        provider.


        ### Response Includes

        - **Server metadata** — hostname, label, IP addresses, region, OS image, plan, specs

        - **Live status** — Current power state fetched from the provider API in real-time

        - **Live usage** — CPU, RAM, disk, and network usage (when available)


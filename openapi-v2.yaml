  /api/v2/webhooks/events:
    get:
      operationId: listWebhookEvents
      tags:
        - Webhooks
      summary: List available event types
      description: >-
        Retrieve the catalog of all available webhook event types with descriptions. Use this to discover which events
        you can subscribe to.


        **No authentication required.**
      security: *a6
      responses:
        "200":
          description: List of available event types
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        event:
                          type: string
                          description: Event type identifier (e.g. server.created)
                        description:
                          type: string
                          description: Human-readable description
                        category:
                          type: string
                          description: Event category (servers, billing, support, etc.)
                      required:
                        - event
                        - description
                        - category
                      description: Webhook event type
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        format: uuid
                        description: Unique request identifier
                      timestamp:
                        type: string
                        format: date-time
                        description: ISO 8601 response timestamp
                      version:
                        type: string
                        enum:
                          - "2.0"
                        description: API version
                    required:
                      - request_id
                      - timestamp
                      - version
                    description: Response metadata
                  errors:
                    type: "null"
                  _links:
                    type: object
                    additionalProperties:
                      type: string
                    description: HATEOAS navigation links
                required:
                  - data
                  - meta
                  - errors
                description: API response envelope
webhooks: {}

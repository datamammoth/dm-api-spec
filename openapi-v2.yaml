  /api/v2/servers/{id}/actions/{action}:
    post:
      operationId: serverAction
      tags:
        - Servers
      summary: Execute a power/lifecycle action
      description: |-
        Execute a power or lifecycle action on a server.

        ### Available Actions
        | Action | Description | Server must be |
        |--------|-------------|----------------|
        | `power-on` | Start the server | Powered off |
        | `power-off` | Force stop (like pulling the power cord) | Running |
        | `reboot` | Hard reboot | Running |
        | `shutdown` | Graceful OS shutdown (ACPI signal) | Running |
        | `rebuild` | Reinstall OS from a new image (destroys all data) | Any |
        | `rescue` | Boot into rescue mode for recovery | Any |

        ### Rebuild
        When `action=rebuild`, pass `image_id` in the request body to specify the new OS image.

        ### Rescue
        When `action=rescue`, pass `root_password` in the body (8+ chars, mixed case, 1+ digit, 2+ special chars).

        **Requires permission:** `servers.power`
      security: *a1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The resource ID (CUID format)
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - power-on
              - power-off
              - reboot
              - shutdown
              - rebuild
              - rescue
          description: The action to execute
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                image_id:
                  type: string
                  description: Required for rebuild — the new OS image ID
                root_password:
                  type: string
                  description: Required for rescue — temporary root password
      responses:
        "200":
          description: Action executed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      action:
                        type: string
                        description: Action executed
                      server_id:
                        type: string
                        description: Server ID
                      status:
                        type: string
                        description: Result status (accepted, completed)
                      message:
                        type: string
                        description: Human-readable result message
                    required:
                      - action
                      - server_id
                      - status
                      - message
                    description: Server action result
                  meta:

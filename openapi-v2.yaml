                          format: date-time
                          description: Creation timestamp
                      required:
                        - id
                        - product_name
                        - billing_cycle
                        - amount
                        - currency
                        - status
                        - start_date
                        - next_due_date
                        - cancelled_at
                        - created_at
                      description: Subscription resource
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        format: uuid
                        description: Unique request identifier
                      timestamp:
                        type: string
                        format: date-time
                        description: ISO 8601 response timestamp

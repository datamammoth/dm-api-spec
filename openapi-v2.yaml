  /api/v2/tasks/{id}:
    get:
      operationId: getTask
      tags:
        - Tasks
      summary: Get task detail
      description: >-
        Get the current status and details of an async task. Use this to poll for completion after creating a server or
        other async operation.


        ### Polling Strategy

        1. Request `GET /api/v2/tasks/{id}`

        2. Check `data.status`

        3. If `pending` or `running`, wait 2-5 seconds and poll again

        4. If `completed`, the task `result` contains the created resource

        5. If `failed`, the `error` field describes what went wrong
      security: *a1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The resource ID (CUID format)
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Task ID
                      type:
                        type: string
                        description: Task type (e.g. server.create, server.delete)
                      status:
                        type: string

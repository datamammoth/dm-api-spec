  /api/v2/affiliate/payout-request:
    post:
      operationId: requestPayout
      tags:
        - Affiliate
      summary: Request a payout
      description: >-
        Request a payout of your available affiliate balance. The payout is processed using your configured payout
        method.


        ### Payout Fees

        | Method | Fee |

        |--------|-----|

        | Balance Credit | Free |

        | Bank Transfer | $5.00 flat |

        | PayPal | 2% + $0.30 |



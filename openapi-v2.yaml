  /api/v2/zones:
    get:
      operationId: listZones
      tags:
        - Servers
      summary: List hosting zones/datacenters
      description: >-
        Retrieve all available hosting zones (datacenters) where servers can be provisioned. Each zone includes location
        details, availability, and a latency test endpoint.


        **No authentication required.** Use this to populate a datacenter selector in your UI.


        ### Response Fields

        - `id`, `slug`, `name` — Zone identifiers

        - `country`, `city`, `continent` — Physical location

        - `is_active` — Whether the zone is accepting new servers

        - `latency_endpoint` — URL you can ping to measure latency from the client
      security: *a6
      parameters:
        - name: filter[continent]
          in: query
          schema:
            type: string
          description: Filter by continent (e.g., EU, NA, AS)
      responses:
        "200":
          description: List of hosting zones
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Zone ID
                        slug:
                          type: string
                          description: URL-friendly slug
                        name:
                          type: string
                          description: Zone display name
                        country:
                          type: string
                          description: Country code (ISO 3166-1)
                        city:
                          type:
                            - string
                            - "null"
                          description: City name
                        continent:
                          type: string
                          description: Continent code (EU, NA, AS, etc.)
                        is_active:
                          type: boolean
                          description: Whether the zone accepts new servers
                        latency_endpoint:
                          type:
                            - string
                            - "null"
                          description: URL to ping for latency measurement
                      required:
                        - id
                        - slug
                        - name
                        - country
                        - city
                        - continent
                        - is_active
                        - latency_endpoint

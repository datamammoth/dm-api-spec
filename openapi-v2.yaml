    post:
      operationId: createServer
      tags:
        - Servers
      summary: Create a server (async)
      description: >-
        Provision a new server. This is an **asynchronous operation** — it returns `202 Accepted` immediately with a
        `task_id` you can poll for progress.


        ### Flow

        1. Submit the request with a product, image, and optional configuration

        2. Receive `202 Accepted` with `task_id` and `Location` header

        3. Poll `GET /api/v2/tasks/{task_id}` until status is `completed` or `failed`

        4. On completion, the task response includes the new server ID


        ### Required Fields

        - `product_id` — The product/plan to provision (get options from `GET /api/v2/products`)

        - `image_id` — OS image to install (get options from `GET /api/v2/zones/{id}/images`)


        ### Optional Fields

        - `zone_id` — Preferred hosting zone/datacenter

        - `hostname` — Custom hostname (auto-generated if omitted)

        - `password` — Root password (auto-generated if omitted)

        - `ssh_key_ids` — Array of SSH key IDs for passwordless access


        **Requires permission:** `servers.create`
      security: *a1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: string
                  description: Product/plan ID to provision
                zone_id:
                  type: string
                  description: Hosting zone ID (optional — uses default zone for the product)
                region:
                  type: string
                  description: Provider region code (alternative to zone_id)
                image_id:
                  type: string
                  description: OS image ID to install
                hostname:
                  type: string
                  description: Custom hostname (auto-generated if omitted)
                password:
                  type: string
                  description: Root password (auto-generated if omitted, min 8 chars)
                ssh_key_ids:
                  type: array
                  items:
                    type: string
                  description: SSH key IDs for passwordless login
              required:
                - product_id
                - image_id
      responses:
        "202":
          description: Accepted. Server provisioning has started. Poll the task for progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      task_id:
                        type: string
                        description: Task ID for polling progress
                      status:
                        type: string
                        enum:
                          - pending
                        description: Initial task status
                      resource_type:
                        type: string
                        description: Type of resource being created/modified
                      _poll_url:
                        type: string
                        description: URL to poll for task status
                    required:
                      - task_id
                      - status
                      - resource_type
                      - _poll_url
                    description: Async operation response
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        format: uuid
                        description: Unique request identifier
                      timestamp:
                        type: string
                        format: date-time
                        description: ISO 8601 response timestamp
                      version:
                        type: string
                        enum:
                          - "2.0"
                        description: API version
                    required:
                      - request_id
                      - timestamp
                      - version
                    description: Response metadata
                  errors:
                    type: "null"
                  _links:
                    type: object
                    additionalProperties:
                      type: string
                    description: HATEOAS links including task polling URL
                required:
                  - data
                  - meta
                  - errors
                description: Async operation accepted
        "401":
          description: Authentication required. Provide a valid Bearer token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: "null"
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        format: uuid
                        description: Unique request identifier
                      timestamp:
                        type: string
                        format: date-time
                        description: ISO 8601 response timestamp
                      version:
                        type: string
                        enum:
                          - "2.0"
                        description: API version
                    required:
                      - request_id
                      - timestamp
                      - version
                    description: Response metadata
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Machine-readable error code (e.g. NOT_FOUND, VALIDATION_FAILED)
                        message:
                          type: string
                          description: Human-readable error description
                        field:
                          type: string
                          description: Field name for validation errors
                      required:
                        - code
                        - message
                      description: Error detail
                required:
                  - data
                  - meta
                  - errors
                description: Error response envelope
        "403":
          description: Insufficient permissions or API key scope.
          content:

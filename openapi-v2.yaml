    post:
      operationId: createWebhook
      tags:
        - Webhooks
      summary: Create a webhook subscription
      description: >-
        Create a webhook subscription to receive real-time notifications when events occur. Each delivery includes an
        `X-DM-Signature` HMAC-SHA256 header for verification.


        ### Event Types

        Use `GET /api/v2/webhooks/events` to see all available events.


        ### Common Events

        - `server.created`, `server.deleted`, `server.status_changed`

        - `invoice.created`, `invoice.paid`, `invoice.overdue`

        - `subscription.created`, `subscription.cancelled`

        - `ticket.created`, `ticket.replied`, `ticket.closed`

        - `order.placed`, `order.completed`

        - `user.created`


        ### Retry Policy

        Failed deliveries are retried up to 5 times with exponential backoff (1m, 5m, 30m, 2h, 24h).


        **Requires authentication.**
      security: *a1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                  description: HTTPS endpoint URL to receive webhook payloads
                events:
                  type: array
                  items:
                    type: string
                  description: Event types to subscribe to
                secret:
                  type: string
                  description: HMAC signing secret (auto-generated if omitted)
              required:
                - url
                - events
      responses:
        "201":
          description: Webhook created. The signing secret is shown only once.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Webhook ID
                      url:
                        type: string
                        description: Endpoint URL
                      events:
                        type: array
                        items:
                          type: string
                        description: Subscribed event types
                      secret_masked:
                        type: string
                        description: Masked signing secret (e.g. whsec_***abc)
                      is_active:
                        type: boolean
                        description: Whether the webhook is active
                      failure_count:
                        type: number
                        description: Consecutive delivery failures
                      last_delivery_at:
                        type:
                          - string
                          - "null"
                        format: date-time
                        description: Last delivery timestamp
                      created_at:
                        type: string
                        format: date-time
                        description: Creation timestamp
                      secret:
                        type: string
                        description: Signing secret (shown only at creation time)
                    required:
                      - id

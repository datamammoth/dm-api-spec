openapi: 3.1.0
info:
  title: DataMammoth API
  version: 2.0.0
  description: |-
    DataMammoth is a multi-tenant hosting and SaaS platform providing
    infrastructure management, billing, affiliate programs, reseller tools,
    and lead management.

    ## Authentication
    Most endpoints require a Bearer token (API key) via the `Authorization` header.
    Generate keys at **Dashboard → Settings → API Keys**.

    ```
    Authorization: Bearer dm_abc12345...
    ```

    ## Rate Limiting
    API requests are rate-limited to 60 requests per minute per API key.
    Rate limit headers are included in every response:
    - `X-RateLimit-Limit` — max requests per window
    - `X-RateLimit-Remaining` — remaining requests
    - `X-RateLimit-Reset` — Unix timestamp when window resets

    ## Response Format
    All responses use a consistent envelope:
    ```json
    {
      "data": { ... },
      "meta": { "request_id": "...", "timestamp": "...", "version": "2.0" },
      "errors": null,
      "_links": { "self": "..." }
    }
    ```
  contact:
    name: DataMammoth Support
    email: support@datamammoth.com
    url: https://datamammoth.com
  license:
    name: Proprietary
    url: https://datamammoth.com/terms
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://app.datamammoth.com
    description: Production
security:
  - bearerAuth: []
tags:
  - name: Health
    description: Service health and status
  - name: Servers
    description: VPS server management
  - name: Products
    description: Product catalog
  - name: Billing
    description: Invoices, subscriptions, and payments
  - name: Support
    description: Support tickets and knowledge base
  - name: Account
    description: User profile and settings
  - name: Admin
    description: Platform administration
  - name: Affiliate
    description: Affiliate and reseller program
  - name: Webhooks
    description: Webhook subscriptions and events
  - name: Tasks
    description: Async operation tracking
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: "API key authentication. Generate keys at Dashboard → Settings → API Keys. Pass via `Authorization: Bearer
        dm_...`"
    cookieAuth:
      type: apiKey
      in: cookie
      name: authjs.session-token
      description: Session cookie authentication (for frontend use)
  schemas:
    V2Meta:
      type: object
      properties:
        request_id:
          type: string
          format: uuid
          description: Unique request identifier (UUID v4)
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 response timestamp
        version:
          type: string
          enum:
            - "2.0"
          description: API version
        pagination:
          type: object
          properties:
            page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
            total_pages:
              type: integer
            has_next:
              type: boolean
            has_previous:
              type: boolean
          required:
            - page
            - per_page
            - total
            - total_pages
            - has_next
            - has_previous
      required:
        - request_id
        - timestamp
        - version
    V2Error:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g. VALIDATION_FAILED)
        message:
          type: string
          description: Human-readable error message
        field:
          type: string
          description: Field name for validation errors
        docs:
          type: string
          description: Link to error documentation
      required:
        - code
        - message
    V2PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
        has_next:
          type: boolean
        has_previous:
          type: boolean
      required:
        - page
        - per_page
        - total
        - total_pages
        - has_next
        - has_previous
    V2Links:
      type: object
      additionalProperties:
        anyOf:
          - type: string
            format: uri
          - type: string
      description: HATEOAS links for resource navigation
    PaginationParams:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          default: 1
          description: Page number (1-based)
        per_page:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          description: Items per page (max 100)
    SortParams:
      type: object
      properties:
        sort:
          type: string
          description: "Comma-separated fields. Prefix with - for descending. Example: -created_at,name"
    SearchParams:
      type: object
      properties:
        search:
          type: string
          description: Full-text search query
  parameters: {}
paths:
  /api/v2/health:
    get:
      operationId: getHealth
      tags:
        - Health
      summary: Service health check
      description: >-
        Check the health of the DataMammoth API and its dependencies (PostgreSQL, Redis).


        **No authentication required.** Use this endpoint for uptime monitoring, load balancer health probes, or
        pre-flight checks before making authenticated calls.


        ### Response Fields

        - `status` — Overall health: `healthy` (all systems up), `degraded` (partial failure), or `unhealthy` (service
        down)

        - `version` — Current API version

        - `uptime` — Process uptime in seconds

        - `checks.database` — PostgreSQL connectivity and latency

        - `checks.redis` — Redis connectivity and latency


        ### Status Codes

        | Code | Meaning |

        |------|---------|

        | 200 | Service is healthy or degraded |

        | 503 | Service is unhealthy — all dependencies failed |
      security: &a6 []
      responses:
        "200":
          description: Service is healthy or degraded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - healthy
                      - degraded
                      - unhealthy
                  version:
                    type: string
                  uptime:
                    type: number
                    description: Process uptime in seconds
                  checks:
                    type: object
                    properties:
                      database:
                        type: object
                        properties:
                          status:
                            type: string
                            enum:
                              - ok
                              - error
                          latency_ms:
                            type: number
                            description: Query latency in milliseconds
                        required:
                          - status
                      redis:
                        type: object
                        properties:
                          status:
                            type: string
                            enum:
                              - ok
                              - error
                          latency_ms:
                            type: number
                            description: Ping latency in milliseconds
                        required:
                          - status
                    required:
                      - database
                      - redis
                required:
                  - status
                  - version
                  - uptime
                  - checks
        "503":
          description: Service is unhealthy — all dependency checks failed
  /api/v2/servers:
    get:
      operationId: listServers
      tags:
        - Servers
      summary: List servers
      description: >-
        Retrieve a paginated list of your provisioned servers. Results are scoped to the authenticated user's tenant.


        ### Filtering

        Use `filter[field]=value` query parameters to narrow results:

        - `filter[status]` — `provisioning`, `active`, `suspended`, `terminated`, `error`

        - `filter[region]` — Region slug (e.g., `us-east`, `eu-west`)

        - `filter[provider]` — Provider name (e.g., `contabo`, `ovh`, `hetzner`)


        ### Sorting

        Use `sort` to order results. Prefix with `-` for descending:

        - `sort=-created_at` — Newest first (default)

        - `sort=hostname` — Alphabetical by hostname


        ### Search

        The `search` parameter searches across hostname, label, and IP address.


        ### Response

        Each server object includes: `id`, `hostname`, `label`, `status`, `ip_address`, `ipv6_address`, `region`,
        `os_image`, `plan`, `specs`, `created_at`.


        **Requires permission:** `servers.read`
      security: &a1
        - bearerAuth: []
      parameters:
        - &a2
          name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number (1-based)
        - &a3
          name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Items per page. Max 100.
        - &a4
          name: sort
          in: query
          schema:
            type: string
          description: |-
            Comma-separated sort fields. Prefix with `-` for descending.

            Examples: `-created_at`, `name`, `-created_at,name`
        - &a5
          name: search
          in: query
          schema:
            type: string
          description: Full-text search query. Searches across name, email, hostname, IP, and other relevant fields.
        - name: filter[status]
          in: query
          schema:
            type: string
          description: "Server status: provisioning, active, suspended, terminated, error"
        - name: filter[region]
          in: query
          schema:
            type: string
          description: Region slug (e.g., us-east)
        - name: filter[provider]
          in: query
          schema:
            type: string
          description: "Provider: contabo, ovh, hetzner, proxmox"
      responses:
        "200":
          description: Paginated list of servers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Server ID (CUID)
                        hostname:
                          type:
                            - string
                            - "null"
                          description: Server hostname
                        label:
                          type:
                            - string
                            - "null"
                          description: Display label
                        status:
                          type: string
                          enum:
                            - provisioning
                            - active
                            - suspended
                            - terminated
                            - error
                          description: Current server status
                        ip_address:
                          type:
                            - string
                            - "null"
                          description: Primary IPv4 address
                        ipv6_address:
                          type:
                            - string
                            - "null"
                          description: IPv6 address
                        region:
                          type:
                            - string
                            - "null"
                          description: Hosting zone/region slug
                        os_image:
                          type:
                            - string
                            - "null"
                          description: Installed OS image name
                        plan:
                          type:
                            - string
                            - "null"
                          description: Product plan code
                        specs:
                          type:
                            - object
                            - "null"
                          properties:
                            cpu:
                              type:
                                - number
                                - "null"
                              description: Number of CPU cores
                            ram_mb:
                              type:
                                - number
                                - "null"
                              description: RAM in megabytes
                            disk_gb:
                              type:
                                - number
                                - "null"
                              description: Disk size in gigabytes
                            bandwidth_tb:
                              type:
                                - number
                                - "null"
                              description: Monthly bandwidth in terabytes
                          required:
                            - cpu
                            - ram_mb
                            - disk_gb
                            - bandwidth_tb
                          description: Hardware specifications
                        provisioned_at:
                          type:
                            - string
                            - "null"
                          format: date-time
                          description: When the server was fully provisioned
                        created_at:
                          type: string
                          format: date-time
                          description: Creation timestamp
                        updated_at:
                          type: string
                          format: date-time
                          description: Last update timestamp
                        permissions:
                          type: object
                          properties:
                            can_power:
                              type: boolean
                              description: Can execute power actions (start, stop, reboot)
                            can_delete:
                              type: boolean
                              description: Can terminate this server
                            can_snapshot:
                              type: boolean
                              description: Can create/restore/delete snapshots
                            can_console:
                              type: boolean
                              description: Can access VNC/SSH console
                            can_update:
                              type: boolean
                              description: Can update server metadata
                          required:
                            - can_power
                            - can_delete
                            - can_snapshot
                            - can_console
                            - can_update
                          description: Inline permissions for current user
                      required:
                        - id
                        - hostname
                        - label
                        - status
                        - ip_address
                        - ipv6_address
                        - region
                        - os_image
                        - plan
                        - specs
                        - provisioned_at
                        - created_at
                        - updated_at
                      description: Server resource
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        format: uuid
                        description: Unique request identifier
                      timestamp:
                        type: string
                        format: date-time

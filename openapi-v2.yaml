                      type: object
                      properties:
                        id:
                          type: string
                          description: Subscription ID
                        product_name:
                          type: string
                          description: Product name
                        billing_cycle:
                          type: string
                          description: Billing cycle (monthly, quarterly, annual)
                        amount:
                          type: number
                          description: Recurring charge amount
                        currency:
                          type: string
                          description: Currency code

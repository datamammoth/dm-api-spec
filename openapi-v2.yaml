  /api/v2/tasks:
    get:
      operationId: listTasks
      tags:
        - Tasks
      summary: List async tasks
      description: >-
        Retrieve a list of asynchronous tasks (server provisioning, termination, etc.). Tasks are created when you
        trigger async operations like `POST /v2/servers` or `DELETE /v2/servers/{id}`.


        ### Task Statuses

        | Status | Meaning |

        |--------|---------|

        | `pending` | Task is queued and waiting to start |

        | `running` | Task is currently executing |

        | `completed` | Task finished successfully |

        | `failed` | Task failed — check `error` field for details |

        | `cancelled` | Task was cancelled by the user |


        Tasks are retained for 24 hours after completion.
      security: *a1
      parameters:
        - *a2
        - *a3
        - *a4
        - *a5
        - name: filter[status]
          in: query
          schema:
            type: string
          description: "Task status: pending, running, completed, failed, cancelled"
      responses:
        "200":
          description: Paginated list of tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Task ID
                        type:
                          type: string
                          description: Task type (e.g. server.create, server.delete)
                        status:
                          type: string
                          enum:
                            - pending
                            - running
                            - completed
                            - failed
                            - cancelled
                          description: Current task status
                        progress:
                          type:
                            - number
                            - "null"
                          description: Progress percentage (0-100)
                        resource_id:
                          type:
                            - string
                            - "null"
                          description: ID of the created/affected resource
                        resource_type:
                          type:
                            - string
                            - "null"
                          description: Type of the affected resource (e.g. server)
                        result:
                          description: Task result data (populated on completion)
                        error:
                          type:
                            - string
                            - "null"
                          description: Error message (populated on failure)
                        started_at:
                          type:
                            - string
                            - "null"
                          format: date-time
                          description: When the task started executing
                        completed_at:
                          type:
                            - string
                            - "null"
                          format: date-time
                          description: When the task finished
                        created_at:
                          type: string
                          format: date-time
                          description: When the task was created
                      required:
                        - id
                        - type
                        - status
                        - progress
                        - resource_id
                        - resource_type
                        - error
                        - started_at
                        - completed_at
                        - created_at
                      description: Async task
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        format: uuid
                        description: Unique request identifier
                      timestamp:
                        type: string
                        format: date-time
                        description: ISO 8601 response timestamp
                      version:
                        type: string
                        enum:
                          - "2.0"
                        description: API version
                      pagination:
                        type: object
                        properties:
                          page:
                            type: number

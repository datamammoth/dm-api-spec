  /api/v2/products/{id}/pricing:
    get:
      operationId: getProductPricing
      tags:
        - Products
      summary: Get pricing with tenant markup
      description: |-
        Retrieve the full pricing breakdown for a product, including tenant-specific markup/override if configured.

        **No authentication required.** Tenant is resolved from the request hostname.

        ### Response Includes
        - **Base pricing** — The product's base price across all billing cycles
        - **Retail pricing** — The final price after tenant markup (percentage or fixed amount)
        - **Markup details** — The markup type and value applied
      security: *a6
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The resource ID (CUID format)
      responses:
        "200":
          description: Pricing breakdown with tenant markup
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      base:
                        type: object
                        properties:
                          monthly:
                            type:
                              - number
                              - "null"
                            description: Monthly price
                          quarterly:
                            type:
                              - number
                              - "null"
                            description: Quarterly price
                          annual:
                            type:
                              - number
                              - "null"
                            description: Annual price
                          one_time:
                            type:
                              - number
                              - "null"
                            description: One-time price
                          setup_fee:
                            type: number
                            description: Setup fee
                          currency:
                            type: string
                            description: Currency code (e.g. USD, EUR)
                        required:
                          - monthly
                          - quarterly
                          - annual
                          - one_time
                          - setup_fee
                          - currency
                        description: Base product pricing
                      retail:
                        type: object
                        properties:
                          monthly:
                            type:
                              - number
                              - "null"
                            description: Monthly price
                          quarterly:
                            type:
                              - number
                              - "null"
                            description: Quarterly price
                          annual:
                            type:
                              - number
                              - "null"
                            description: Annual price
                          one_time:
                            type:
                              - number
                              - "null"
                            description: One-time price
                          setup_fee:
                            type: number
                            description: Setup fee
                          currency:
                            type: string
                            description: Currency code (e.g. USD, EUR)
                        required:
                          - monthly
                          - quarterly
                          - annual
                          - one_time
                          - setup_fee
                          - currency
                        description: Retail pricing after tenant markup
                      markup:
                        type: object
                        properties:
                          type:
                            type: string
                            enum:
                              - percentage
                              - fixed
                              - none
                            description: Markup type
                          value:
                            type: number
                            description: Markup value (percentage or fixed amount)
                        required:
                          - type
                          - value
                        description: Markup applied by tenant
                    required:
                      - base
                      - retail
                      - markup
                    description: Full pricing breakdown
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        format: uuid
                        description: Unique request identifier
                      timestamp:
                        type: string
                        format: date-time

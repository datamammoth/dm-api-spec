  /api/v2/subscriptions:
    get:
      operationId: listSubscriptions
      tags:
        - Billing
      summary: List subscriptions
      description: >-
        Retrieve all your active and past subscriptions. Each subscription is linked to a product and generates
        recurring invoices.


        ### Response Fields

        Each subscription includes: product name, billing cycle, amount, currency, status, start date, next due date,
        and cancellation date (if applicable).


        ### Subscription Statuses

        | Status | Description |

        |--------|-------------|

        | `pending` | Awaiting first payment |

        | `active` | Active and billing normally |

        | `overdue` | Payment is past due |

        | `suspended` | Suspended due to non-payment |

        | `cancelled` | Cancelled by user |

        | `terminated` | Terminated (final state) |


        **Requires authentication.**
      security: *a1
      parameters: &a7
        - *a2
        - *a3
        - *a4
        - *a5

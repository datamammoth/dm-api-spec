  /api/v2/invoices:
    get:
      operationId: listInvoices
      tags:
        - Billing
      summary: List invoices
      description: >-
        Retrieve a paginated list of your invoices. Results are scoped to the authenticated user.


        ### Filtering

        - `filter[status]` — `unpaid`, `paid`, `overdue`, `cancelled`, `refunded`


        ### Response Fields

        Each invoice includes: invoice number, status, subtotal, discount, tax, total, currency, due date, paid date,
        and creation date.


        **Requires authentication.**
      security: *a1
      parameters:
        - *a2
        - *a3
        - *a4
        - *a5
        - name: filter[status]
          in: query
          schema:
            type: string
          description: "Invoice status: unpaid, paid, overdue, cancelled, refunded"
      responses:
        "200":
          description: Paginated list of invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Invoice ID
                        invoice_number:
                          type: string
                          description: Invoice number (e.g. INV-2026-0042)
                        status:
                          type: string
                          enum:
                            - unpaid
                            - paid
                            - overdue
                            - cancelled
                            - refunded
                          description: Invoice status
                        subtotal:
                          type: number
                          description: Subtotal before discount and tax
                        discount:
                          type: number
                          description: Discount amount
                        tax:
                          type: number
                          description: Tax amount
                        total:
                          type: number
                          description: Total amount due
                        currency:
                          type: string
                          description: Currency code (e.g. USD)
                        due_date:
                          type:
                            - string
                            - "null"
                          format: date-time
                          description: Payment due date
                        paid_date:
                          type:
                            - string
                            - "null"
                          format: date-time
                          description: Date payment was received
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                description: Line item ID
                              description:
                                type: string
                                description: Item description
                              quantity:
                                type: number
                                description: Quantity
                              unit_price:
                                type: number
                                description: Price per unit
                              total:
                                type: number
                                description: Line item total (quantity x unit_price)
                            required:
                              - id
                              - description
                              - quantity

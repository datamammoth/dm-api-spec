        Replace the entire firewall ruleset for a server. Pass the complete list of rules — any existing rules not in
        the new list will be removed.


        ### Rule Format

        Each rule requires:

        - `action` — `accept` or `drop`

        - `protocol` — `tcp`, `udp`, or `icmp`

        - `port` — Port number or range (e.g., `80`, `8000-9000`)

        - `source` — Source CIDR (optional, defaults to `0.0.0.0/0`)



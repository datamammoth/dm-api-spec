  /api/v2/tickets/{id}/replies:
    post:
      operationId: replyToTicket
      tags:
        - Support
      summary: Add a reply to a ticket
      description: >-
        Add a customer reply to an existing ticket. The ticket status is automatically updated to `customer_reply` and
        the assigned agent is notified.


        **Requires authentication.** You can only reply to your own tickets.
      security: *a1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The resource ID (CUID format)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  minLength: 1
                  description: Reply message body
              required:
                - message
      responses:
        "201":
          description: Reply added
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Reply ID
                      message:
                        type: string
                        description: Reply message body
                      is_staff:

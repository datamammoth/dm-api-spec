  /api/v2/kb/articles:
    get:
      operationId: searchKBArticles
      tags:
        - Support
      summary: Search knowledge base articles
      description: |-
        Search the public knowledge base. Without a search query, returns popular/featured articles.

        **No authentication required.**

        ### Query Parameters
        - `q` — Search query (searches title, content, and tags)
        - `filter[category]` — Filter by category slug
      security: *a6
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Search query
        - name: filter[category]
          in: query
          schema:
            type: string
          description: Category slug
      responses:
        "200":
          description: Paginated list of KB articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Article ID
                        title:
                          type: string
                          description: Article title
                        slug:
                          type: string
                          description: URL slug
                        content:
                          type: string
                          description: Article content (markdown, included in detail view)
                        excerpt:
                          type:
                            - string
                            - "null"
                          description: Short excerpt for listings
                        category:
                          type:
                            - string
                            - "null"
                          description: Category name
                        tags:
                          type: array
                          items:
                            type: string
                          description: Tags
                        view_count:
                          type: number
                          description: Total view count
                        helpful_count:
                          type: number
                          description: Helpful votes
                        created_at:
                          type: string
                          format: date-time
                          description: Publication date
                        updated_at:
                          type: string
                          format: date-time
                          description: Last update timestamp
                      required:
                        - id
                        - title
                        - slug
                        - excerpt
                        - category
                        - tags
                        - view_count
                        - helpful_count
                        - created_at
                        - updated_at
                      description: Knowledge base article
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        format: uuid
                        description: Unique request identifier
                      timestamp:
                        type: string
                        format: date-time
                        description: ISO 8601 response timestamp
                      version:
                        type: string
                        enum:
                          - "2.0"
                        description: API version
                      pagination:
                        type: object
                        properties:
                          page:
                            type: number
                            description: Current page number
                          per_page:
                            type: number
                            description: Items per page
                          total:
                            type: number
                            description: Total items across all pages
                          total_pages:
                            type: number
                            description: Total number of pages
                          has_next:
                            type: boolean
                            description: Whether a next page exists
                          has_previous:
                            type: boolean
                            description: Whether a previous page exists
                        required:
                          - page
                          - per_page
                          - total
                          - total_pages
                          - has_next
                          - has_previous
                        description: Pagination metadata (present on list endpoints)
                    required:
                      - request_id
                      - timestamp
                      - version
                    description: Response metadata
                  errors:
                    type: "null"
                  _links:
                    type: object
                    additionalProperties:
                      type: string
                    description: HATEOAS navigation links (self, next, prev, first, last)
                required:
                  - data
                  - meta
                  - errors
                description: Paginated list response

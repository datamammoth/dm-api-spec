  /api/v2/servers/{id}/metrics:
    get:
      operationId: getServerMetrics
      tags:
        - Servers
      summary: Get server metrics
      description: >-
        Retrieve CPU, RAM, disk, and network metrics for a server over a specified time period.


        ### Periods

        | Value | Description |

        |-------|-------------|

        | `1h` | Last 1 hour (5-minute intervals) |

        | `6h` | Last 6 hours (15-minute intervals) |

        | `24h` | Last 24 hours (1-hour intervals) — **default** |

        | `7d` | Last 7 days (6-hour intervals) |

        | `30d` | Last 30 days (1-day intervals) |


        ### Data Sources

        Metrics are fetched from the provider API when available, with fallback to the monitoring agent data collected
        on the server.


        ### Response Fields

        - `points` — Array of timestamped metric data points

        - `summary` — Aggregated stats (avg/max CPU, avg/max memory, total network, uptime %)


        **Requires permission:** `servers.read`
      security: *a1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The resource ID (CUID format)
        - name: period
          in: query
          schema:
            type: string
            enum:
              - 1h
              - 6h
              - 24h
              - 7d
              - 30d
            default: 24h
          description: Time period for metrics
      responses:
        "200":
          description: Server metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      server_id:
                        type: string
                        description: Server ID
                      period:
                        type: string
                        description: Time period queried (e.g. 24h)
                      points:
                        type: array
                        items:
                          type: object
                          properties:
                            timestamp:
                              type: string
                              format: date-time
                              description: Data point timestamp
                            cpu_percent:
                              type:
                                - number
                                - "null"
                              description: CPU usage percentage
                            ram_percent:
                              type:
                                - number
                                - "null"
                              description: RAM usage percentage
                            disk_percent:
                              type:
                                - number
                                - "null"
                              description: Disk usage percentage
                            network_in_mbps:
                              type:
                                - number
                                - "null"
                              description: Inbound network Mbps
                            network_out_mbps:
                              type:
                                - number
                                - "null"
                              description: Outbound network Mbps
                          required:
                            - timestamp
                            - cpu_percent
                            - ram_percent
                            - disk_percent
                            - network_in_mbps
                            - network_out_mbps
                          description: Metric data point
                        description: Time-series data points
                      summary:
                        type: object
                        properties:
                          avg_cpu:
                            type:
                              - number
                              - "null"
                            description: Average CPU usage %

  /api/v2/tickets/{id}:
    get:
      operationId: getTicket
      tags:
        - Support
      summary: Get ticket detail with replies
      description: >-
        Retrieve a ticket with its full reply history. Replies are ordered chronologically.


        ### Reply Fields

        Each reply includes: message, sender type (`customer` or `agent`), staff flag, and timestamp. Internal notes are
        excluded from customer-facing responses.


        **Requires authentication.** You can only access your own tickets.
      security: *a1
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The resource ID (CUID format)
      responses:
        "200":
          description: Ticket detail with replies

    post:
      operationId: placeOrder
      tags:
        - Billing
      summary: Place a new order
      description: >-
        Place a new order for one or more products. An invoice is generated automatically and payment is attempted using
        the default payment method.


        ### Order Items

        Each item requires a `product_id`. Optional fields:

        - `quantity` — Number of units (default: 1)

        - `billing_cycle` — `monthly`, `quarterly`, `annual`, etc.

        - `options` — Configurable option selections (key-value map)


        ### Promo Codes

        Include `promo_code` to apply a discount. Validate codes first with `GET /api/v2/promo/validate?code=X`.


        **Requires authentication.**
      security: *a1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      product_id:
                        type: string
                        description: Product ID
                      quantity:
                        type: number
                        default: 1
                        description: "Quantity (default: 1)"
                      billing_cycle:
                        type: string
                        description: "Billing cycle: monthly, quarterly, annual, etc."
                      options:
                        type: object
                        additionalProperties: {}
                        description: Configurable options as key-value pairs
                    required:

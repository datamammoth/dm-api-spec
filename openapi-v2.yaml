  /api/v2/products/{id}/options:
    get:
      operationId: getProductOptions
      tags:
        - Products
      summary: List configurable options
      description: >-
        Retrieve the configurable options for a product (e.g., RAM size, disk type, OS). Each option includes the
        available choices and their price adjustments.


        **No authentication required.**


        ### Option Types

        | Type | Description |

        |------|-------------|

        | `select` | Dropdown — user picks one choice |

        | `toggle` | On/off switch |

        | `text` | Free-text input (e.g., hostname) |

        | `number` | Numeric input (e.g., quantity) |
      security: *a6
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The resource ID (CUID format)
      responses:
        "200":
          description: List of configurable options
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Option ID
                        name:
                          type: string
                          description: Option name
                        type:
                          type: string
                          enum:
                            - select
                            - toggle
                            - text
                            - number
                          description: Option input type
                        required:
                          type: boolean
                          description: Whether this option is required
                        choices:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                description: Choice ID
                              label:
                                type: string
                                description: Choice display label
                              value:
                                type: string
                                description: Choice value
                              price_adjustment:
                                type: number
                                description: Price adjustment for this choice
                              is_default:
                                type: boolean
                                description: Whether this is the default choice
                            required:
                              - id
                              - label
                              - value
                              - price_adjustment
                              - is_default
                            description: Configurable option choice
                          description: Available choices (for select type)
                      required:

                        format: uuid
                        description: Unique request identifier
                      timestamp:
                        type: string
                        format: date-time
                        description: ISO 8601 response timestamp
                      version:
                        type: string
                        enum:
                          - "2.0"
                        description: API version
                    required:
                      - request_id
                      - timestamp
                      - version
                    description: Response metadata
                  errors:
                    type: "null"
                  _links:
                    type: object
                    additionalProperties:
                      type: string
                    description: HATEOAS navigation links
                required:
                  - data
                  - meta
                  - errors
                description: API response envelope

    post:
      operationId: createApiKey
      tags:
        - Account
      summary: Create an API key
      description: >-
        Generate a new API key. The full key is returned **only once** in the response — store it securely as it cannot
        be retrieved again.


        ### Scopes

        Scopes restrict what the key can do. Common scopes:

        - `servers.read`, `servers.create`, `servers.delete`

        - `billing.read`, `billing.manage`

        - `support.read`, `support.create`

        - `*` — Full access (use with caution)


        If no scopes are specified, the key inherits all permissions from your role.


        ### IP Allowlist

        Restrict key usage to specific IP addresses for security. Pass an array of IPs or CIDRs.


        **Requires authentication.**
      security: *a1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Display name for the key
                scopes:
                  type: array
                  items:
                    type: string
                  description: Permission scopes (e.g., ["servers.read", "billing.read"])
                allowed_ips:
                  type: array
                  items:
                    type: string
                  description: IP allowlist (e.g., ["1.2.3.4", "10.0.0.0/8"])
                expires_in_days:
                  type: number
                  description: Expiry in days (null = never expires)
              required:
                - name
      responses:

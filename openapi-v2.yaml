      tags:
        - Account
      summary: Get activity log
      description: >-
        Retrieve your account's activity/audit log. Includes login events, API key usage, profile changes, and other
        account actions.


        ### Filtering

        - `filter[action]` — Filter by action type (e.g., `user.login`, `apikey.created`)

        - `filter[entity]` — Filter by entity type


        **Requires authentication.**
      security: *a1
      parameters:
        - *a2
        - *a3
        - *a4
        - *a5
        - name: filter[action]
          in: query
          schema:
            type: string
          description: Action type (e.g., user.login)
        - name: filter[entity]
          in: query
          schema:
            type: string
          description: Entity type
      responses:
        "200":
          description: Paginated activity log
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Activity log entry ID

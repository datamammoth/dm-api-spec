        adjustments.


        ### Transaction Types

        `TOP_UP`, `AUTO_TOP_UP`, `INVOICE_PAYMENT`, `REFUND`, `ADMIN_ADJUSTMENT`, `PROMO_CREDIT`, `TRANSFER`



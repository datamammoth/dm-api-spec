                      - version
                    description: Response metadata
                  errors:
                    type: "null"
                  _links:
                    type: object
                    additionalProperties:
                      type: string
                    description: HATEOAS navigation links (self, next, prev, first, last)
                required:
                  - data
                  - meta
                  - errors
                description: Paginated list response
        "401":
          description: Authentication required. Provide a valid Bearer token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: "null"
                  meta:

  /api/v2/products:
    get:
      operationId: listProducts
      tags:
        - Products
      summary: List products
      description: >-
        Retrieve the product catalog. Products represent hosting plans, add-ons, SSL certificates, and other purchasable
        items.


        **No authentication required.** Public storefront endpoint.


        ### Filtering

        - `filter[type]` — Product type: `vps`, `gpu`, `ssl`, `addon`, `service`, `license`, `domain`, `hosting`

        - `filter[category]` — Category name

        - `filter[status]` — `active`, `inactive`, `deprecated`


        ### Response Fields

        Each product includes: name, slug, description, type, category, pricing (monthly/quarterly/annual/one-time),
        specs (CPU, RAM, disk), badges, and feature lists.
      security: *a6
      parameters:
        - *a2
        - *a3
        - *a4
        - *a5
        - name: filter[type]
          in: query
          schema:
            type: string
          description: "Product type: vps, gpu, ssl, addon, service, license"
        - name: filter[category]
          in: query
          schema:
            type: string
          description: Category name
        - name: filter[status]
          in: query
          schema:
            type: string
          description: "Status: active, inactive, deprecated"
      responses:
        "200":
          description: Paginated product catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Product ID
                        name:
                          type: string
                          description: Product display name
                        slug:
                          type: string
                          description: URL-friendly slug
                        description:
                          type:
                            - string
                            - "null"
                          description: Full product description (markdown)
                        short_description:
                          type:
                            - string
                            - "null"
                          description: Short description for cards/listings
                        type:
                          type: string
                          description: Product type (vps, gpu, ssl, addon, service, license, domain, hosting)
                        category:
                          type:
                            - string
                            - "null"
                          description: Category name
                        status:
                          type: string
                          enum:
                            - active
                            - inactive
                            - deprecated
                          description: Product status
                        pricing:
                          type: object
                          properties:
                            monthly:
                              type:
                                - number
                                - "null"
                              description: Monthly price
                            quarterly:
                              type:
                                - number
                                - "null"
                              description: Quarterly price
                            annual:
                              type:
                                - number
                                - "null"
                              description: Annual price
                            one_time:
                              type:
                                - number
                                - "null"
                              description: One-time price
                            setup_fee:
                              type: number
                              description: Setup fee
                            currency:
                              type: string
                              description: Currency code (e.g. USD, EUR)
                          required:
                            - monthly
                            - quarterly
                            - annual
                            - one_time
                            - setup_fee
                            - currency
                          description: Pricing information
                        specs:
                          type:
                            - object
                            - "null"
                          properties:
                            cpu:
                              type:
                                - number
                                - "null"
                              description: Number of CPU cores
                            ram_gb:
                              type:
                                - number
                                - "null"
                              description: RAM in GB
                            disk_gb:
                              type:
                                - number
                                - "null"
                              description: Disk size in GB
                            disk_type:
                              type:
                                - string
                                - "null"
                              description: Disk type (SSD, NVMe, HDD)
                            bandwidth:
                              type:
                                - string
                                - "null"
                              description: Bandwidth allowance (e.g. 32 TB)
                          required:
                            - cpu
                            - ram_gb
                            - disk_gb
                            - disk_type
                            - bandwidth
                          description: Hardware specifications
                        is_featured:
                          type: boolean
                          description: Whether the product is featured
                        badge:
                          type:
                            - string
                            - "null"
                          description: Badge text (e.g. Best Value, New)
                        features:
                          type: array
                          items:
                            type: string
                          description: List of included features
                        created_at:
                          type: string
                          format: date-time
                          description: Creation timestamp
                        updated_at:
                          type: string
                          format: date-time
                          description: Last update timestamp
                      required:
                        - id
                        - name
                        - slug
                        - description
                        - short_description
                        - type
                        - category
                        - status
                        - pricing
                        - specs
                        - is_featured
                        - badge
                        - features
                        - created_at
                        - updated_at
                      description: Product resource
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                        format: uuid
                        description: Unique request identifier
                      timestamp:
                        type: string
                        format: date-time
                        description: ISO 8601 response timestamp
